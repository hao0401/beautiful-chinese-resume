name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate skill metadata
        run: python scripts/validate_skill.py .

      - name: Lint sample resume JSON
        run: python scripts/lint_resume_json.py examples/sample_resume.json --strict

      - name: Compile scripts
        run: python -m py_compile scripts/build_resume_docx.py scripts/verify_resume_docx.py scripts/validate_skill.py scripts/lint_resume_json.py

      - name: Run tests
        run: python -m pytest
